<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg-law" cx="60%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1A1508"/>
      <stop offset="100%" stop-color="#0A0C0F"/>
    </radialGradient>
    <linearGradient id="paper-grad" x1="0" y1="0" x2="0.05" y2="1">
      <stop offset="0%" stop-color="#F2EDD8"/>
      <stop offset="100%" stop-color="#E5DFC8"/>
    </linearGradient>
    <linearGradient id="paper2" x1="0" y1="0" x2="0.05" y2="1">
      <stop offset="0%" stop-color="#EDE8D3"/>
      <stop offset="100%" stop-color="#DDD8C0"/>
    </linearGradient>
    <filter id="doc-shadow">
      <feDropShadow dx="6" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="stamp-blur">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
    <filter id="glow-amber">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="1200" height="630" fill="url(#bg-law)"/>

  <!-- Marble texture overlay (thin lines) -->
  <g stroke="#1C1508" stroke-width="0.6" opacity="0.25">
    <path d="M 600 0 Q 700 150 650 300 Q 600 450 680 630" fill="none"/>
    <path d="M 700 0 Q 800 200 750 350 Q 700 500 780 630" fill="none"/>
    <path d="M 550 0 Q 620 180 580 320 Q 540 460 600 630" fill="none"/>
    <path d="M 850 0 Q 900 200 870 350 Q 840 500 900 630" fill="none"/>
    <path d="M 950 0 Q 980 180 960 300 Q 940 430 1000 630" fill="none"/>
  </g>

  <!-- Warm amber glow center-right -->
  <ellipse cx="720" cy="300" rx="280" ry="200" fill="#5A3A08" opacity="0.12"/>
  <!-- Secondary glow -->
  <ellipse cx="820" cy="220" rx="160" ry="120" fill="#8A5A10" opacity="0.08"/>

  <!-- ── DOCUMENT STACK ── -->

  <!-- Back document (slightly rotated) -->
  <g transform="translate(460, 80) rotate(-4, 200, 250)" filter="url(#doc-shadow)">
    <rect x="0" y="0" width="380" height="490" rx="3" fill="url(#paper2)"/>
    <!-- Header band -->
    <rect x="0" y="0" width="380" height="50" rx="3" fill="#2A2010"/>
    <rect x="0" y="40" width="380" height="10" fill="#2A2010"/>
    <text x="190" y="32" font-family="'Bebas Neue', sans-serif" font-size="14" fill="#C8A040" text-anchor="middle" letter-spacing="3">ФЕДЕРАЛЬНЫЙ ЗАКОН</text>
    <!-- Lines -->
    <g stroke="#C8BC98" stroke-width="0.8" opacity="0.5">
      <line x1="25" y1="80" x2="355" y2="80"/>
      <line x1="25" y1="100" x2="355" y2="100"/>
      <line x1="25" y1="120" x2="310" y2="120"/>
      <line x1="25" y1="140" x2="330" y2="140"/>
      <line x1="25" y1="160" x2="355" y2="160"/>
      <line x1="25" y1="180" x2="290" y2="180"/>
      <line x1="25" y1="200" x2="340" y2="200"/>
      <line x1="25" y1="220" x2="355" y2="220"/>
      <line x1="25" y1="240" x2="320" y2="240"/>
    </g>
  </g>

  <!-- Middle document -->
  <g transform="translate(480, 65) rotate(2, 190, 250)" filter="url(#doc-shadow)">
    <rect x="0" y="0" width="380" height="500" rx="3" fill="url(#paper-grad)"/>
    <rect x="0" y="0" width="380" height="56" rx="3" fill="#1E1A0C"/>
    <rect x="0" y="46" width="380" height="10" fill="#1E1A0C"/>
    <text x="190" y="22" font-family="'Bebas Neue', sans-serif" font-size="11" fill="#A08030" text-anchor="middle" letter-spacing="3">РОССИЙСКАЯ ФЕДЕРАЦИЯ</text>
    <text x="190" y="42" font-family="'Bebas Neue', sans-serif" font-size="13" fill="#C8A040" text-anchor="middle" letter-spacing="2">НАЛОГОВЫЙ КОДЕКС</text>
    <!-- Text lines -->
    <g stroke="#B8B098" stroke-width="0.9" opacity="0.6">
      <line x1="25" y1="85" x2="355" y2="85"/>
      <line x1="25" y1="105" x2="340" y2="105"/>
      <line x1="25" y1="125" x2="355" y2="125"/>
      <line x1="25" y1="145" x2="300" y2="145"/>
      <line x1="25" y1="165" x2="350" y2="165"/>
      <line x1="25" y1="185" x2="320" y2="185"/>
      <line x1="25" y1="205" x2="355" y2="205"/>
      <line x1="25" y1="225" x2="335" y2="225"/>
      <line x1="25" y1="245" x2="355" y2="245"/>
      <line x1="25" y1="265" x2="310" y2="265"/>
      <line x1="25" y1="285" x2="345" y2="285"/>
      <line x1="25" y1="305" x2="355" y2="305"/>
    </g>
    <!-- Article number highlight -->
    <rect x="25" y="320" width="310" height="28" fill="#C8A040" opacity="0.12" rx="2"/>
    <text x="35" y="338" font-family="'Bebas Neue', sans-serif" font-size="13" fill="#8A6020">СТАТЬЯ 346.43. ПАТЕНТНАЯ СИСТЕМА НАЛОГООБЛОЖЕНИЯ</text>
    <g stroke="#B8B098" stroke-width="0.9" opacity="0.5">
      <line x1="25" y1="365" x2="355" y2="365"/>
      <line x1="25" y1="385" x2="330" y2="385"/>
      <line x1="25" y1="405" x2="355" y2="405"/>
      <line x1="25" y1="425" x2="340" y2="425"/>
    </g>
  </g>

  <!-- Front document (main focus) -->
  <g transform="translate(500, 50)" filter="url(#doc-shadow)">
    <rect x="0" y="0" width="380" height="510" rx="3" fill="url(#paper-grad)"/>
    <!-- Header -->
    <rect x="0" y="0" width="380" height="60" rx="3" fill="#14100A"/>
    <rect x="0" y="50" width="380" height="10" fill="#14100A"/>
    <text x="190" y="22" font-family="'Bebas Neue', sans-serif" font-size="10" fill="#8A6828" text-anchor="middle" letter-spacing="4">ФЕДЕРАЛЬНАЯ НАЛОГОВАЯ СЛУЖБА</text>
    <text x="190" y="44" font-family="'Bebas Neue', sans-serif" font-size="15" fill="#D4A030" text-anchor="middle" letter-spacing="2">УВЕДОМЛЕНИЕ ЕНС</text>

    <!-- Text lines -->
    <g stroke="#C0BA98" stroke-width="1" opacity="0.65">
      <line x1="30" y1="90" x2="350" y2="90"/>
      <line x1="30" y1="112" x2="350" y2="112"/>
      <line x1="30" y1="134" x2="320" y2="134"/>
      <line x1="30" y1="156" x2="350" y2="156"/>
      <line x1="30" y1="178" x2="300" y2="178"/>
      <line x1="30" y1="200" x2="350" y2="200"/>
      <line x1="30" y1="222" x2="335" y2="222"/>
      <line x1="30" y1="244" x2="350" y2="244"/>
    </g>

    <!-- Amount block -->
    <rect x="30" y="258" width="320" height="50" rx="3" fill="#F8F2D8" stroke="#D4B850" stroke-width="1"/>
    <text x="44" y="278" font-family="Inter, sans-serif" font-size="11" fill="#666">Сумма к уплате:</text>
    <text x="44" y="298" font-family="'Bebas Neue', sans-serif" font-size="20" fill="#111" letter-spacing="1">247 500 ₽</text>
    <text x="300" y="298" font-family="Inter, sans-serif" font-size="10" fill="#888" text-anchor="end">до 28.04.2026</text>

    <!-- More lines -->
    <g stroke="#C0BA98" stroke-width="1" opacity="0.5">
      <line x1="30" y1="328" x2="350" y2="328"/>
      <line x1="30" y1="348" x2="330" y2="348"/>
      <line x1="30" y1="368" x2="350" y2="368"/>
      <line x1="30" y1="388" x2="310" y2="388"/>
    </g>

    <!-- SIGNATURE AREA -->
    <rect x="30" y="405" width="320" height="55" rx="2" fill="#F5EFD5" stroke="#D0C8A0" stroke-width="0.8"/>
    <!-- Signature scribble -->
    <path d="M 55 438 Q 75 420 90 435 Q 105 448 120 432 Q 135 418 150 430" stroke="#2A2010" stroke-width="1.5" fill="none" opacity="0.7"/>
    <text x="220" y="435" font-family="Inter, sans-serif" font-size="10" fill="#888">ИП Иванов И.И.</text>
    <line x1="190" y1="445" x2="340" y2="445" stroke="#888" stroke-width="0.7"/>
    <text x="265" y="453" font-family="Inter, sans-serif" font-size="8" fill="#aaa" text-anchor="middle">подпись / ФИО</text>

    <!-- ── ROUND STAMP ── -->
    <g transform="translate(215, 395)" opacity="0.82">
      <!-- Outer ring -->
      <circle cx="0" cy="0" r="52" fill="none" stroke="#1A4080" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="46" fill="none" stroke="#1A4080" stroke-width="1"/>
      <!-- Inner fill -->
      <circle cx="0" cy="0" r="44" fill="#1A4080" opacity="0.07"/>
      <!-- Text on circle path (simulated with positioned text) -->
      <text font-family="Inter, sans-serif" font-size="7.5" fill="#1A4080" letter-spacing="1.5" text-anchor="middle">
        <textPath xlink:href="#stamp-circle">ИНСПЕКЦИЯ ФНС РОССИИ · № 15 · МОСКВА</textPath>
      </text>
      <!-- Star in center -->
      <text x="0" y="6" font-size="22" text-anchor="middle" fill="#1A4080">★</text>
      <!-- Date -->
      <text x="0" y="20" font-family="Inter, sans-serif" font-size="8" fill="#1A4080" text-anchor="middle">03.05.2026</text>
      <!-- Simulated arc text top -->
      <text x="-36" y="-28" font-family="Inter, sans-serif" font-size="6.5" fill="#1A4080" transform="rotate(-30)">ПРИНЯТО</text>
    </g>
  </g>

  <!-- Amber accent line at bottom of documents -->
  <rect x="500" y="555" width="380" height="2" fill="#C8A040" opacity="0.4"/>

  <!-- ── TEXT AREA (LEFT) ── -->
  <rect x="60" y="80" width="180" height="22" fill="#3A2808" opacity="0.8"/>
  <text x="72" y="96" font-family="'Bebas Neue', sans-serif" font-size="12" fill="#C8A040" letter-spacing="2">ЗАКОНОДАТЕЛЬСТВО</text>

  <text x="60" y="150" font-family="'Bebas Neue', sans-serif" font-size="42" fill="#FFFFFF" letter-spacing="1.5">ИЗМЕНЕНИЯ</text>
  <text x="60" y="200" font-family="'Bebas Que', sans-serif" font-size="42" fill="#FFFFFF" letter-spacing="1.5">ДЛЯ БИЗНЕСА</text>
  <text x="60" y="250" font-family="'Bebas Neue', sans-serif" font-size="42" fill="#C8A040" letter-spacing="1.5">В 2026 ГОДУ</text>

  <rect x="60" y="268" width="240" height="2" fill="#C8A040" opacity="0.6" filter="url(#glow-amber)"/>

  <text x="60" y="300" font-family="Inter, sans-serif" font-size="15" fill="#9A8A60">НДС для УСН, ЕНС, КЭДО, мораторий</text>
  <text x="60" y="322" font-family="Inter, sans-serif" font-size="15" fill="#9A8A60">на проверки — что важно знать.</text>

  <!-- Footer -->
  <rect x="60" y="500" width="200" height="32" rx="3" fill="#14100A" stroke="#3A2A10" stroke-width="1"/>
  <text x="160" y="521" font-family="Inter, sans-serif" font-size="12" fill="#9A8A60" text-anchor="middle">Этикетка · 2026</text>
</svg>
