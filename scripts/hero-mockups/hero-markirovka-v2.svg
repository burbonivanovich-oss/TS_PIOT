<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- BG: brand lime — как плашка категории "Маркировка" -->
  <rect width="1200" height="630" fill="#C8F500"/>

  <!-- Decorative monogram -->
  <text x="620" y="560"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="680"
    fill="#111"
    opacity="0.06"
    letter-spacing="-0.04em"
    text-anchor="middle">ЧЗ</text>

  <!-- Barcode-like vertical strips accent (right half) -->
  <g opacity="0.08" fill="#111">
    <rect x="820" y="0" width="4" height="630"/>
    <rect x="828" y="0" width="8" height="630"/>
    <rect x="842" y="0" width="3" height="630"/>
    <rect x="851" y="0" width="6" height="630"/>
    <rect x="863" y="0" width="4" height="630"/>
    <rect x="873" y="0" width="10" height="630"/>
    <rect x="889" y="0" width="3" height="630"/>
    <rect x="898" y="0" width="5" height="630"/>
    <rect x="909" y="0" width="8" height="630"/>
    <rect x="923" y="0" width="3" height="630"/>
    <rect x="932" y="0" width="6" height="630"/>
    <rect x="944" y="0" width="4" height="630"/>
    <rect x="954" y="0" width="9" height="630"/>
    <rect x="969" y="0" width="3" height="630"/>
    <rect x="978" y="0" width="5" height="630"/>
    <rect x="989" y="0" width="7" height="630"/>
    <rect x="1002" y="0" width="4" height="630"/>
    <rect x="1012" y="0" width="8" height="630"/>
    <rect x="1026" y="0" width="3" height="630"/>
    <rect x="1035" y="0" width="6" height="630"/>
    <rect x="1047" y="0" width="4" height="630"/>
    <rect x="1057" y="0" width="9" height="630"/>
    <rect x="1072" y="0" width="3" height="630"/>
    <rect x="1081" y="0" width="5" height="630"/>
    <rect x="1092" y="0" width="8" height="630"/>
    <rect x="1106" y="0" width="3" height="630"/>
    <rect x="1115" y="0" width="6" height="630"/>
    <rect x="1127" y="0" width="4" height="630"/>
    <rect x="1137" y="0" width="10" height="630"/>
    <rect x="1153" y="0" width="3" height="630"/>
    <rect x="1162" y="0" width="5" height="630"/>
    <rect x="1173" y="0" width="7" height="630"/>
  </g>

  <!-- Horizontal rule -->
  <rect x="60" y="280" width="200" height="3" fill="#111" opacity="0.5"/>

  <!-- Category label text -->
  <text x="60" y="240"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="13"
    fill="#111"
    letter-spacing="0.18em"
    opacity="0.6">ЧЕСТНЫЙ ЗНАК · МАРКИРОВКА · УЧЁТ</text>

  <!-- Main headline -->
  <text x="60" y="340"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="96"
    fill="#111"
    letter-spacing="0.02em">ЧЕСТНЫЙ</text>
  <text x="60" y="432"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="96"
    fill="#111"
    letter-spacing="0.02em">ЗНАК:</text>
  <text x="60" y="524"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="96"
    fill="#111"
    opacity="0.45"
    letter-spacing="0.02em">МАРКИРОВКА</text>

  <!-- Category pill -->
  <rect x="60" y="60" width="160" height="26" fill="#111"/>
  <text x="74" y="78"
    font-family="'Inter', 'Arial', sans-serif"
    font-size="11"
    font-weight="700"
    fill="#C8F500"
    letter-spacing="0.1em">МАРКИРОВКА</text>

  <!-- Date stamp -->
  <text x="1140" y="590"
    font-family="'Inter', 'Arial', sans-serif"
    font-size="11"
    fill="#8aaa00"
    letter-spacing="0.08em"
    text-anchor="end">ЭТИКЕТКА · 2026</text>

  <!-- Right info block -->
  <rect x="900" y="60" width="2" height="510" fill="#111" opacity="0.15"/>
  <text x="930" y="120"
    font-family="'Inter', 'Arial', sans-serif"
    font-size="12"
    fill="#556600"
    letter-spacing="0.06em">КАТЕГОРИЙ</text>
  <text x="930" y="172"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="72"
    fill="#111"
    opacity="0.6"
    letter-spacing="0.01em">60+</text>
  <rect x="930" y="185" width="80" height="2" fill="#111" opacity="0.2"/>
  <text x="930" y="230"
    font-family="'Inter', 'Arial', sans-serif"
    font-size="12"
    fill="#556600"
    letter-spacing="0.06em">ТОВАРНЫХ ГРУПП</text>
  <text x="930" y="290"
    font-family="'Inter', 'Arial', sans-serif"
    font-size="12"
    fill="#556600"
    letter-spacing="0.06em">ПОДЛЕЖАТ</text>
  <text x="930" y="340"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="36"
    fill="#111"
    opacity="0.55">МАРКИРОВКЕ</text>
  <text x="930" y="376"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="36"
    fill="#111"
    opacity="0.55">В 2026 ГОДУ</text>
</svg>
