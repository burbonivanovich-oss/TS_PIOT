<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- BG: sand — как фон сайта -->
  <rect width="1200" height="630" fill="#EDE8DF"/>

  <!-- Large decorative monogram -->
  <text x="620" y="560"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="680"
    fill="#111"
    opacity="0.05"
    letter-spacing="-0.04em"
    text-anchor="middle">НК</text>

  <!-- Dark block — left accent strip -->
  <rect x="0" y="0" width="12" height="630" fill="#111"/>

  <!-- Horizontal rules suggesting document lines -->
  <g opacity="0.12" fill="#111">
    <rect x="60" y="390" width="760" height="2"/>
    <rect x="60" y="410" width="600" height="2"/>
    <rect x="60" y="430" width="700" height="2"/>
    <rect x="60" y="450" width="500" height="2"/>
    <rect x="60" y="470" width="660" height="2"/>
    <rect x="60" y="490" width="580" height="2"/>
    <rect x="60" y="510" width="720" height="2"/>
  </g>

  <!-- Category label -->
  <text x="60" y="200"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="13"
    fill="#111"
    letter-spacing="0.18em"
    opacity="0.4">ЗАКОНОДАТЕЛЬСТВО · НПА · НАЛОГИ · ЭДО</text>

  <!-- Horizontal rule above headline -->
  <rect x="60" y="215" width="200" height="2" fill="#E8175D" opacity="0.8"/>

  <!-- Main headline — large, dark, uppercase -->
  <text x="60" y="300"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="106"
    fill="#111"
    letter-spacing="0.01em">ИЗМЕНЕНИЯ</text>
  <text x="60" y="400"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="106"
    fill="#111"
    letter-spacing="0.01em">ДЛЯ БИЗНЕСА</text>
  <text x="60" y="500"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="106"
    fill="#111"
    opacity="0.25"
    letter-spacing="0.01em">В 2026 ГОДУ</text>

  <!-- Category pill — dark bg with original pink accent -->
  <rect x="60" y="60" width="196" height="26" fill="#111"/>
  <text x="74" y="78"
    font-family="'Inter', 'Arial', sans-serif"
    font-size="11"
    font-weight="700"
    fill="#C8F500"
    letter-spacing="0.1em">ЗАКОНОДАТЕЛЬСТВО</text>

  <!-- Date stamp -->
  <text x="1140" y="590"
    font-family="'Inter', 'Arial', sans-serif"
    font-size="11"
    fill="#999"
    letter-spacing="0.08em"
    text-anchor="end">ЭТИКЕТКА · 2026</text>

  <!-- Right side dark panel -->
  <rect x="880" y="0" width="320" height="630" fill="#111"/>

  <!-- Right panel content: key numbers -->
  <text x="910" y="100"
    font-family="'Inter', 'Arial', sans-serif"
    font-size="11"
    fill="#555"
    letter-spacing="0.1em">УСН / ЛИМИТ ДОХОДА</text>
  <text x="910" y="155"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="60"
    fill="#C8F500"
    letter-spacing="0.01em">450 МЛН</text>

  <rect x="910" y="170" width="200" height="1" fill="#333"/>

  <text x="910" y="215"
    font-family="'Inter', 'Arial', sans-serif"
    font-size="11"
    fill="#555"
    letter-spacing="0.1em">НДС ДЛЯ УСН С 2026</text>
  <text x="910" y="270"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="60"
    fill="#fff"
    opacity="0.8"
    letter-spacing="0.01em">5% / 7%</text>

  <rect x="910" y="285" width="200" height="1" fill="#333"/>

  <text x="910" y="330"
    font-family="'Inter', 'Arial', sans-serif"
    font-size="11"
    fill="#555"
    letter-spacing="0.1em">МРОТ С 01.01.2026</text>
  <text x="910" y="385"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="52"
    fill="#E8175D"
    letter-spacing="0.01em">27 093 ₽</text>

  <rect x="910" y="400" width="200" height="1" fill="#333"/>

  <text x="910" y="445"
    font-family="'Inter', 'Arial', sans-serif"
    font-size="11"
    fill="#555"
    letter-spacing="0.1em">СТАВКА МСП ПО ВЗНОСАМ</text>
  <text x="910" y="500"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="60"
    fill="#C8F500"
    letter-spacing="0.01em">15%</text>

  <rect x="910" y="515" width="200" height="1" fill="#333"/>

  <text x="910" y="558"
    font-family="'Inter', 'Arial', sans-serif"
    font-size="11"
    fill="#333"
    letter-spacing="0.08em">ЭТИКЕТКА · МЕДИА ДЛЯ МСБ</text>
</svg>
