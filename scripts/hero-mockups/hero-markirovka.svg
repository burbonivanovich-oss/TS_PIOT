  <!-- Teal scan laser line across label -->
  <rect x="490" y="338" width="340" height="2" fill="#00CC66" opacity="0.8" filter="url(#glow-teal)"/>

  <!-- ── TEXT AREA (LEFT) ── -->
  <rect x="60" y="80" width="170" height="22" fill="#1A5C32" opacity="0.7"/>
  <text x="72" y="96" font-family="'Bebas Neue', sans-serif" font-size="12" fill="#AFCC00" letter-spacing="2">МАРКИРОВКА</text>

  <text x="60" y="150" font-family="'Bebas Neue', sans-serif" font-size="42" fill="#FFFFFF" letter-spacing="1.5">ЧЕСТНЫЙ ЗНАК:</text>
  <text x="60" y="200" font-family="'Bebas Neue', sans-serif" font-size="42" fill="#FFFFFF" letter-spacing="1.5">КАК УСТРОЕН</text>
  <text x="60" y="250" font-family="'Bebas Neue', sans-serif" font-size="42" fill="#AFCC00" letter-spacing="1.5">УЧЁТ ТОВАРА</text>

  <rect x="60" y="268" width="240" height="2" fill="#1A9C50" opacity="0.8"/>

  <text x="60" y="298" font-family="Inter, sans-serif" font-size="15" fill="#6AAA88">DataMatrix — цифровой паспорт</text>
  <text x="60" y="320" font-family="Inter, sans-serif" font-size="15" fill="#6AAA88">каждой единицы товара.</text>

  <!-- Footer -->
  <rect x="60" y="500" width="200" height="32" rx="3" fill="#071A10" stroke="#1A4A28" stroke-width="1"/>
  <text x="160" y="521" font-family="Inter, sans-serif" font-size="12" fill="#6AAA88" text-anchor="middle">Этикетка · 2026</text>
</svg>
