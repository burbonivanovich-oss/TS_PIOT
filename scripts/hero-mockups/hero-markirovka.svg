        <rect x="86" y="5" width="2" height="52"/>
        <rect x="90" y="5" width="4" height="52"/>
        <rect x="96" y="5" width="2" height="52"/>
        <rect x="100" y="5" width="2" height="52"/>
        <rect x="104" y="5" width="4" height="52"/>
        <rect x="110" y="5" width="2" height="52"/>
        <!-- Center guard -->
        <rect x="145" y="5" width="2" height="58"/>
        <rect x="149" y="5" width="2" height="58"/>
        <!-- Right half -->
        <rect x="155" y="5" width="4" height="52"/>
        <rect x="161" y="5" width="2" height="52"/>
        <rect x="165" y="5" width="2" height="52"/>
        <rect x="169" y="5" width="4" height="52"/>
        <rect x="175" y="5" width="2" height="52"/>
        <rect x="179" y="5" width="4" height="52"/>
        <rect x="185" y="5" width="2" height="52"/>
        <rect x="189" y="5" width="2" height="52"/>
        <rect x="193" y="5" width="4" height="52"/>
        <rect x="199" y="5" width="2" height="52"/>
        <rect x="203" y="5" width="2" height="52"/>
        <rect x="207" y="5" width="4" height="52"/>
        <rect x="213" y="5" width="2" height="52"/>
        <rect x="217" y="5" width="4" height="52"/>
        <rect x="223" y="5" width="2" height="52"/>
