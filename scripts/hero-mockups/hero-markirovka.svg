    <rect x="0" y="42" width="340" height="18" fill="#1A5C32"/>
    <!-- Brand area -->
    <text x="170" y="35" font-family="'Bebas Neue', sans-serif" font-size="26" fill="#AFCC00" text-anchor="middle" letter-spacing="2">ЧЕСТНЫЙ ЗНАК</text>

    <!-- Product name -->
    <text x="170" y="100" font-family="'Bebas Neue', sans-serif" font-size="22" fill="#111" text-anchor="middle" letter-spacing="1">МОЛОКО ПАСТЕРИЗОВАННОЕ</text>
    <text x="170" y="124" font-family="Inter, sans-serif" font-size="13" fill="#333" text-anchor="middle">3,2% жирности · 1 л</text>

    <!-- Divider -->
