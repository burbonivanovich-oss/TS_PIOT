        <rect x="15" y="15" width="14" height="14"/>
        <rect x="84" y="8" width="28" height="28" fill="none" stroke="#111" stroke-width="4"/>
        <rect x="91" y="15" width="14" height="14"/>
        <rect x="8" y="84" width="28" height="28" fill="none" stroke="#111" stroke-width="4"/>
        <rect x="15" y="91" width="14" height="14"/>
        <!-- Data cells -->
        <rect x="50" y="8" width="6" height="6"/>
        <rect x="60" y="8" width="6" height="6"/>
        <rect x="70" y="8" width="6" height="6"/>
        <rect x="50" y="18" width="6" height="6"/>
        <rect x="64" y="18" width="6" height="6"/>
        <rect x="50" y="30" width="6" height="6"/>
        <rect x="56" y="36" width="6" height="6"/>
        <rect x="66" y="30" width="6" height="6"/>
        <rect x="70" y="40" width="6" height="6"/>
        <rect x="84" y="50" width="6" height="6"/>
        <rect x="84" y="62" width="6" height="6"/>
        <rect x="50" y="50" width="6" height="6"/>
        <rect x="60" y="56" width="6" height="6"/>
        <rect x="50" y="64" width="6" height="6"/>
        <rect x="66" y="64" width="6" height="6"/>
        <rect x="50" y="76" width="6" height="6"/>
        <rect x="62" y="76" width="6" height="6"/>
        <rect x="74" y="76" width="6" height="6"/>
        <rect x="84" y="76" width="6" height="6"/>
        <rect x="84" y="86" width="6" height="6"/>
        <rect x="84" y="96" width="6" height="6"/>
        <rect x="84" y="106" width="6" height="6"/>
        <rect x="40" y="84" width="6" height="6"/>
        <rect x="40" y="96" width="6" height="6"/>
        <rect x="40" y="108" width="6" height="6"/>
      </g>
    </g>

    <!-- Label info fields -->
