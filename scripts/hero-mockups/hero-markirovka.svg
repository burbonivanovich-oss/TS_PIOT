<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg-grad" cx="55%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#071A10"/>
      <stop offset="100%" stop-color="#030D08"/>
    </radialGradient>
    <linearGradient id="label-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4F0E8"/>
      <stop offset="100%" stop-color="#DDD8CC"/>
    </linearGradient>
    <filter id="shadow-label">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-teal">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- Subtle diagonal barcode texture in background -->
  <g stroke="#0A2015" stroke-width="1" opacity="0.3">
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="503" y1="0" x2="503" y2="630"/>
    <line x1="508" y1="0" x2="508" y2="630"/>
    <line x1="511" y1="0" x2="511" y2="630"/>
    <line x1="520" y1="0" x2="520" y2="630"/>
    <line x1="523" y1="0" x2="523" y2="630"/>
    <line x1="532" y1="0" x2="532" y2="630"/>
    <line x1="537" y1="0" x2="537" y2="630"/>
    <line x1="542" y1="0" x2="542" y2="630"/>
    <line x1="549" y1="0" x2="549" y2="630"/>
    <line x1="558" y1="0" x2="558" y2="630"/>
    <line x1="565" y1="0" x2="565" y2="630"/>
    <line x1="574" y1="0" x2="574" y2="630"/>
    <line x1="583" y1="0" x2="583" y2="630"/>
    <line x1="594" y1="0" x2="594" y2="630"/>
    <line x1="605" y1="0" x2="605" y2="630"/>
    <line x1="616" y1="0" x2="616" y2="630"/>
    <line x1="619" y1="0" x2="619" y2="630"/>
    <line x1="628" y1="0" x2="628" y2="630"/>
    <line x1="631" y1="0" x2="631" y2="630"/>
