  <!-- Ambient teal glow right -->
  <ellipse cx="750" cy="315" rx="300" ry="220" fill="#0D4A28" opacity="0.15"/>

  <!-- ── PRODUCT LABEL (main focal object) ── -->
  <g transform="translate(490, 90)" filter="url(#shadow-label)">
    <!-- Label body -->
    <rect x="0" y="0" width="340" height="460" rx="6" fill="url(#label-grad)"/>
    <!-- Label top color band -->
