      <text x="175" y="165">01 04607087</text>
      <text x="175" y="182">0312001 21 ABC</text>
      <text x="175" y="199">17 260601</text>
      <text x="175" y="216">10 П5АА21001</text>
    </g>
    <text x="175" y="200" font-size="9" fill="#888">GTIN / Серийный номер</text>

