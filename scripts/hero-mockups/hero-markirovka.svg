    <!-- Best before -->
    <text x="20" y="390" font-family="Inter, sans-serif" font-size="11" fill="#555">Годен до: 01.06.2026</text>
    <text x="20" y="408" font-family="Inter, sans-serif" font-size="11" fill="#555">Масса нетто: 1000 г</text>
    <text x="20" y="426" font-family="Inter, sans-serif" font-size="11" fill="#555">ГОСТ 31450-2013</text>

    <!-- Teal verification checkmark -->
