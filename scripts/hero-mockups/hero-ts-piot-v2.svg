<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- BG: brand dark -->
  <rect width="1200" height="630" fill="#111"/>

  <!-- Decorative monogram — brand pattern from cards, scaled up -->
  <text x="620" y="560"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="680"
    fill="#C8F500"
    opacity="0.08"
    letter-spacing="-0.04em"
    text-anchor="middle">ТС</text>

  <!-- Horizontal rule accent -->
  <rect x="60" y="280" width="200" height="3" fill="#C8F500" opacity="0.9"/>

  <!-- Category label -->
  <text x="60" y="240"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="13"
    fill="#C8F500"
    letter-spacing="0.18em"
    opacity="0.85">ТС ПИОТ · МАРКИРОВКА · КАССА</text>

  <!-- Main headline -->
  <text x="60" y="340"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="96"
    fill="#fff"
    letter-spacing="0.02em">ТЕХНИЧЕСКОЕ</text>
  <text x="60" y="432"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="96"
    fill="#fff"
    letter-spacing="0.02em">СРЕДСТВО</text>
  <text x="60" y="524"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="96"
    fill="#C8F500"
    letter-spacing="0.02em">ПОЛУЧЕНИЯ</text>

  <!-- Small label pill top-left -->
  <rect x="60" y="60" width="130" height="26" fill="#C8F500"/>
  <text x="74" y="78"
    font-family="'Inter', 'Arial', sans-serif"
    font-size="11"
    font-weight="700"
    fill="#111"
    letter-spacing="0.1em">ТС ПИОТ</text>

  <!-- Date / edition stamp — bottom right -->
  <text x="1140" y="590"
    font-family="'Inter', 'Arial', sans-serif"
    font-size="11"
    fill="#555"
    letter-spacing="0.08em"
    text-anchor="end">ЭТИКЕТКА · 2026</text>

  <!-- Vertical rule accent right side -->
  <rect x="900" y="60" width="2" height="510" fill="#C8F500" opacity="0.12"/>

  <!-- Right side secondary info -->
  <text x="930" y="120"
    font-family="'Inter', 'Arial', sans-serif"
    font-size="12"
    fill="#444"
    letter-spacing="0.06em">ОБЯЗАТЕЛЕН</text>
  <text x="930" y="158"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="48"
    fill="#C8F500"
    letter-spacing="0.01em">28.12</text>
  <text x="930" y="196"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="48"
    fill="#C8F500"
    letter-spacing="0.01em">2025</text>
  <rect x="930" y="210" width="80" height="2" fill="#C8F500" opacity="0.4"/>
  <text x="930" y="248"
    font-family="'Inter', 'Arial', sans-serif"
    font-size="12"
    fill="#444"
    letter-spacing="0.06em">ШТРАФ ДО</text>
  <text x="930" y="290"
    font-family="'Bebas Neue', 'Arial Black', sans-serif"
    font-size="52"
    fill="#fff"
    opacity="0.7">10 000 ₽</text>
</svg>
