<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">

  <!-- BG: sand -->
  <rect width="1200" height="630" fill="#EDE8DF"/>

  <!-- ── RIGHT SIDE: flat document stack illustration ── -->

  <!-- Back doc (rotated) -->
  <g transform="translate(874, 96) rotate(-5)">
    <rect x="0" y="0" width="320" height="420" fill="#DDD8CC" rx="3"/>
    <rect x="0" y="0" width="320" height="48" fill="#2A2010" rx="3"/>
    <rect x="0" y="38" width="320" height="10" fill="#2A2010"/>
    <text x="160" y="32" font-family="'Bebas Neue','Arial Black',sans-serif"
      font-size="13" fill="#C8A040" text-anchor="middle" letter-spacing="0.12em">ФЕДЕРАЛЬНЫЙ ЗАКОН</text>
    <g stroke="#C0BAA8" stroke-width="1.2" opacity="0.6">
      <line x1="20" y1="72" x2="300" y2="72"/>
      <line x1="20" y1="92" x2="270" y2="92"/>
      <line x1="20" y1="112" x2="300" y2="112"/>
      <line x1="20" y1="132" x2="250" y2="132"/>
      <line x1="20" y1="152" x2="290" y2="152"/>
    </g>
  </g>

  <!-- Middle doc -->
  <g transform="translate(856, 82) rotate(3)">
    <rect x="0" y="0" width="320" height="430" fill="#E8E2D2" rx="3"/>
    <rect x="0" y="0" width="320" height="52" fill="#1E1A0E" rx="3"/>
    <rect x="0" y="42" width="320" height="10" fill="#1E1A0E"/>
    <text x="160" y="20" font-family="'Bebas Neue','Arial Black',sans-serif"
      font-size="10" fill="#906820" text-anchor="middle" letter-spacing="0.15em">РОССИЙСКАЯ ФЕДЕРАЦИЯ</text>
    <text x="160" y="40" font-family="'Bebas Neue','Arial Black',sans-serif"
      font-size="13" fill="#C8A040" text-anchor="middle" letter-spacing="0.1em">НАЛОГОВЫЙ КОДЕКС</text>
    <g stroke="#C0BAA8" stroke-width="1.2" opacity="0.55">
      <line x1="20" y1="74" x2="300" y2="74"/>
      <line x1="20" y1="94" x2="280" y2="94"/>
      <line x1="20" y1="114" x2="300" y2="114"/>
      <line x1="20" y1="134" x2="260" y2="134"/>
      <line x1="20" y1="154" x2="290" y2="154"/>
      <line x1="20" y1="174" x2="300" y2="174"/>
      <line x1="20" y1="194" x2="240" y2="194"/>
    </g>
    <!-- Highlighted article line -->
    <rect x="20" y="210" width="280" height="22" fill="#C8A040" opacity="0.15" rx="2"/>
    <text x="26" y="225" font-family="'Bebas Neue','Arial Black',sans-serif"
      font-size="11" fill="#7A5010">СТ. 346.43 · ПАТЕНТНАЯ СИСТЕМА</text>
  </g>

  <!-- Front document — main -->
  <g transform="translate(840, 68)">
    <rect x="0" y="0" width="320" height="440" fill="#F5F0E4" rx="3"/>
    <!-- Shadow under doc -->
    <rect x="4" y="4" width="320" height="440" fill="#111" opacity="0.08" rx="3"/>
    <!-- Reset after shadow -->
    <rect x="0" y="0" width="320" height="440" fill="#F5F0E4" rx="3"/>
    <!-- Header -->
    <rect x="0" y="0" width="320" height="56" fill="#111" rx="3"/>
    <rect x="0" y="46" width="320" height="10" fill="#111"/>
    <text x="160" y="18" font-family="'Bebas Neue','Arial Black',sans-serif"
      font-size="9" fill="#666" text-anchor="middle" letter-spacing="0.18em">ФЕДЕРАЛЬНАЯ НАЛОГОВАЯ СЛУЖБА</text>
    <text x="160" y="42" font-family="'Bebas Neue','Arial Black',sans-serif"
      font-size="16" fill="#E8175D" text-anchor="middle" letter-spacing="0.08em">УВЕДОМЛЕНИЕ ЕНС</text>
    <!-- Text lines -->
    <g stroke="#C8C0A8" stroke-width="1.3" opacity="0.6">
      <line x1="20" y1="80" x2="300" y2="80"/>
      <line x1="20" y1="100" x2="280" y2="100"/>
      <line x1="20" y1="120" x2="300" y2="120"/>
      <line x1="20" y1="140" x2="260" y2="140"/>
      <line x1="20" y1="160" x2="290" y2="160"/>
      <line x1="20" y1="180" x2="300" y2="180"/>
      <line x1="20" y1="200" x2="240" y2="200"/>
    </g>
    <!-- Amount box -->
    <rect x="20" y="216" width="280" height="52" fill="#FFF8E8" stroke="#D4B850" stroke-width="1" rx="2"/>
    <text x="30" y="234" font-family="'Inter','Arial',sans-serif"
      font-size="10" fill="#888">Сумма к уплате:</text>
    <text x="30" y="257" font-family="'Bebas Neue','Arial Black',sans-serif"
      font-size="24" fill="#111" letter-spacing="0.04em">247 500 ₽</text>
    <text x="290" y="257" font-family="'Inter','Arial',sans-serif"
      font-size="10" fill="#aaa" text-anchor="end">до 28.04.2026</text>
    <!-- More lines -->
    <g stroke="#C8C0A8" stroke-width="1.3" opacity="0.4">
      <line x1="20" y1="286" x2="300" y2="286"/>
      <line x1="20" y1="306" x2="270" y2="306"/>
      <line x1="20" y1="326" x2="290" y2="326"/>
    </g>
    <!-- Signature area -->
    <rect x="20" y="342" width="280" height="48" fill="#EDE8D0" stroke="#D0C8A0" stroke-width="0.8" rx="2"/>
    <path d="M 35 374 Q 55 356 70 371 Q 85 384 100 368 Q 115 354 130 366"
      stroke="#444" stroke-width="1.5" fill="none" opacity="0.6"/>
    <line x1="170" y1="378" x2="290" y2="378" stroke="#bbb" stroke-width="0.8"/>
    <text x="230" y="373" font-family="'Inter','Arial',sans-serif"
      font-size="9" fill="#999" text-anchor="middle">ИП Иванов И.И.</text>
    <!-- ── ROUND STAMP ── -->
    <g transform="translate(228, 340)" opacity="0.75">
      <circle cx="0" cy="0" r="44" fill="none" stroke="#1A3080" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="38" fill="none" stroke="#1A3080" stroke-width="0.8"/>
      <circle cx="0" cy="0" r="36" fill="#1A3080" opacity="0.06"/>
      <!-- Star -->
      <text x="0" y="6" font-size="20" text-anchor="middle" fill="#1A3080">★</text>
      <text x="0" y="20" font-family="'Inter','Arial',sans-serif"
        font-size="7.5" fill="#1A3080" text-anchor="middle" letter-spacing="0.05em">03.05.2026</text>
      <!-- Arc text simulation -->
      <text x="-28" y="-22" font-family="'Inter','Arial',sans-serif"
        font-size="6" fill="#1A3080" transform="rotate(-32)" letter-spacing="0.05em">ПРИНЯТО</text>
      <text x="-8" y="-35" font-family="'Inter','Arial',sans-serif"
        font-size="6" fill="#1A3080" transform="rotate(-8)" letter-spacing="0.04em">ФНС · №15</text>
    </g>
    <!-- Amber accent corner -->
    <rect x="0" y="430" width="320" height="10" fill="#C8A040" rx="3" opacity="0.5"/>
  </g>

  <!-- ── LEFT SIDE: text ── -->

  <!-- Category pill -->
  <rect x="60" y="60" width="196" height="26" fill="#111"/>
  <text x="74" y="78" font-family="'Inter','Arial',sans-serif"
    font-size="11" font-weight="700" fill="#C8F500" letter-spacing="0.1em">ЗАКОНОДАТЕЛЬСТВО</text>

  <!-- Rule -->
  <rect x="60" y="104" width="200" height="2" fill="#E8175D" opacity="0.7"/>

  <!-- Headline -->
  <text x="60" y="190"
    font-family="'Bebas Neue','Arial Black',sans-serif"
    font-size="96" fill="#111" letter-spacing="0.01em">ИЗМЕНЕНИЯ</text>
  <text x="60" y="285"
    font-family="'Bebas Neue','Arial Black',sans-serif"
    font-size="96" fill="#111" letter-spacing="0.01em">ДЛЯ МСБ</text>
  <text x="60" y="372"
    font-family="'Bebas Neue','Arial Black',sans-serif"
    font-size="96" fill="#111" opacity="0.2" letter-spacing="0.01em">В 2026</text>

  <!-- Description -->
  <text x="60" y="420" font-family="'Inter','Arial',sans-serif"
    font-size="15" fill="#666">УСН + НДС, ЕНС, КЭДО, мораторий</text>
  <text x="60" y="441" font-family="'Inter','Arial',sans-serif"
    font-size="15" fill="#666">на проверки, МРОТ 27 093 ₽ —</text>
  <text x="60" y="462" font-family="'Inter','Arial',sans-serif"
    font-size="15" fill="#666">что важно знать бизнесу.</text>

  <!-- Key number block -->
  <rect x="60" y="500" width="240" height="60" fill="#111"/>
  <text x="76" y="522" font-family="'Inter','Arial',sans-serif"
    font-size="10" font-weight="700" fill="#666" letter-spacing="0.1em">НДС ДЛЯ УСН С 2026</text>
  <text x="76" y="550" font-family="'Bebas Neue','Arial Black',sans-serif"
    font-size="30" fill="#E8175D" letter-spacing="0.04em">5% / 7% / 20%</text>

  <!-- Footer -->
  <text x="60" y="600" font-family="'Inter','Arial',sans-serif"
    font-size="11" fill="#999" letter-spacing="0.08em">ЭТИКЕТКА · МЕДИА ДЛЯ БИЗНЕСА</text>

</svg>
