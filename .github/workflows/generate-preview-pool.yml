name: Generate Preview Pool

on:
  workflow_dispatch:
    inputs:
      category:
        description: 'Категория (пусто = все 5: ts-piot, markirovka, zakonodatelstvo, kkt, egais)'
        required: false
        default: ''
      force:
        description: 'Перегенерировать существующие файлы (true/false)'
        required: false
        default: 'false'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CATEGORY: ${{ inputs.category }}
      FORCE: ${{ inputs.force == 'true' && '1' || '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Generate preview pool
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node scripts/generate-preview-images.mjs

      - name: Commit pool images
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/preview/
          git diff --staged --quiet || git commit -m "feat(images): обновить пул превью"
          git push origin HEAD
