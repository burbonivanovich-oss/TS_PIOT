name: Поиск — эмбеддинги (ежемесячно)

on:
  schedule:
    # Первое число каждого месяца, 05:00 UTC (~08:00 МСК)
    - cron: "0 5 1 * *"
  workflow_dispatch:
    inputs:
      provider:
        description: "Провайдер embeddings: jina (default) или openai"
        required: false
        default: "jina"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate embeddings
        env:
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EMBEDDINGS_PROVIDER: ${{ inputs.provider || 'jina' }}
        run: node scripts/audit/embed-articles.mjs

      - name: Compute similarity matrix
        run: node scripts/audit/similarity.mjs

      - name: Commit refresh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/audit/embeddings.json src/data/audit/similarity.json src/data/audit/similarity-report.md
          if git diff --cached --quiet; then
            echo "embeddings: нет изменений"
            exit 0
          fi
          git commit -m "embeddings: monthly refresh $(date -u +%Y-%m-%d)"
          git push origin HEAD:${{ github.ref_name }}
