name: Метрика — синхронизация целей

# Синхронизация целей в счётчике Яндекс.Метрики со списком в
# src/data/metrika/goals.json через Management API.
# Скрипт: scripts/metrika/sync-goals.mjs
# Создаёт недостающие, обновляет имена. PRUNE=1 — удаляет orphan-цели
# (которых нет в goals.json); по умолчанию они только помечаются.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'DRY_RUN (1 = только показать план, не записывать)'
        required: false
        default: '1'
      prune:
        description: 'PRUNE (1 = удалить цели, которых нет в goals.json — стирает их историю)'
        required: false
        default: '0'
  push:
    branches:
      - main
    paths:
      - 'src/data/metrika/goals.json'
      - 'scripts/metrika/sync-goals.mjs'

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ inputs.dry_run || '0' }}
      PRUNE: ${{ inputs.prune || '0' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Sync goals
        env:
          METRIKA_OAUTH_TOKEN: ${{ secrets.METRIKA_OAUTH_TOKEN }}
        run: node scripts/metrika/sync-goals.mjs
