name: ORD Sync — регистрация креативов

on:
  push:
    branches: [main]
    paths:
      - 'src/data/ord-config.json'   # новый рекламодатель → регистрируем
      - 'src/data/ord-erids.json'    # ручное изменение → синхронизируем

  workflow_dispatch:
    inputs:
      banner:
        description: 'bannerId для одиночной регистрации (пусто = все новые)'
        required: false
      force:
        description: 'FORCE=1 — перерегистрировать даже если erid уже есть'
        required: false
        default: 'false'

jobs:
  sync:
    name: Синхронизация с Яндекс ОРД
    runs-on: ubuntu-latest

    permissions:
      contents: write   # для коммита ord-erids.json

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Регистрация креативов в ОРД
        env:
          ORD_API_KEY:   ${{ secrets.ORD_API_KEY }}
          BANNER:        ${{ github.event.inputs.banner }}
          FORCE:         ${{ github.event.inputs.force == 'true' && '1' || '' }}
          SKIP_PLATFORM: '1'
        run: node scripts/ord-register.mjs

      - name: Закоммитить ord-erids.json (если изменился)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/ord-erids.json
          if git diff --cached --quiet; then
            echo "ord-erids.json не изменился — коммит не нужен"
          else
            git commit -m "chore(ord): обновлены erid-токены [skip ci]"
            git push
          fi
