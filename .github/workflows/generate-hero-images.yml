name: Generate Hero Images

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Slug статьи (без даты, например 2026-05-01-markirovka-piva-roznica). Пусто = все статьи без hero'
        required: false
        default: ''
      limit:
        description: 'Сколько статей обработать за раз (0 = все без ограничений)'
        required: false
        default: '5'
      force:
        description: 'Перегенерировать даже если heroImage уже есть (1 = да)'
        required: false
        default: '0'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SLUG:  ${{ inputs.slug }}
      LIMIT: ${{ inputs.limit }}
      FORCE: ${{ inputs.force }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Generate hero images
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node scripts/generate-hero-images.mjs

      - name: Commit hero images
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/hero/ src/content/blog/
          git diff --staged --quiet || git commit -m "feat(images): hero-изображения статей"
          git push origin HEAD
