name: Generate Hero Images

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Slug статьи (без .md). Пусто = все статьи без heroImage'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Generate hero images (FLUX via OpenRouter)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SLUG: ${{ inputs.slug }}
        run: node scripts/generate-hero-images.mjs

      - name: Commit hero images
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/hero/ src/content/blog/
          git diff --staged --quiet || git commit -m "feat(hero): AI hero-изображения через FLUX (OpenRouter)"
          git push
