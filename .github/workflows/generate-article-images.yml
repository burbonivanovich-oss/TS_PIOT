name: Generate Article Images

on:
  push:
    branches: [main, claude/generate-article-images-RXhwD]
    paths:
      - 'src/content/blog/**.md'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Slug статьи (без .md). Пусто = все статьи без изображений'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SLUG: ${{ inputs.slug }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Generate preview images (FLUX Schnell via Together.ai)
        env:
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
        run: node scripts/generate-preview-images.mjs
        continue-on-error: false

      - name: Generate hero images (Nano Banana 2 via OpenRouter)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node scripts/generate-hero-images.mjs
        continue-on-error: false

      - name: Commit images
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/preview/ public/images/hero/ src/content/blog/
          git diff --staged --quiet || git commit -m "feat(images): превью + hero (FLUX via OpenRouter)"
          git push origin HEAD
