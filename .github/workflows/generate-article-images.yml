name: Generate Article Images

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Slug статьи (без .md). Пусто = по лимиту'
        required: false
        default: ''
      limit:
        description: 'Сколько статей обработать (0 = все без изображений)'
        required: false
        default: '0'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SLUG: ${{ inputs.slug }}
      LIMIT: ${{ inputs.limit }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Generate preview images (FLUX via DeepInfra)
        env:
          DEEPINFRA_TOKEN: ${{ secrets.DEEPINFRA_TOKEN }}
        run: node scripts/generate-preview-images.mjs

      - name: Generate hero images (FLUX via DeepInfra)
        env:
          DEEPINFRA_TOKEN: ${{ secrets.DEEPINFRA_TOKEN }}
        run: node scripts/generate-hero-images.mjs

      - name: Commit images
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/preview/ public/images/hero/ src/content/blog/
          git diff --staged --quiet || git commit -m "feat(images): превью + hero (FLUX via DeepInfra)"
          git push origin HEAD
