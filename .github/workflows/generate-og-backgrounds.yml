name: Generate OG Backgrounds

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Модель генерации'
        required: false
        default: 'black-forest-labs/flux-1-schnell'
        type: choice
        options:
          # --- FLUX (Black Forest Labs) ---
          - black-forest-labs/flux-1-schnell        # бесплатно
          - black-forest-labs/flux-2-klein          # FLUX.2 fast
          - black-forest-labs/flux-2-max            # FLUX.2 лучшее
          - black-forest-labs/flux-1-1-pro
          - black-forest-labs/flux-pro
          - black-forest-labs/flux-1-dev
          # --- OpenAI ---
          - openai/gpt-image-1                      # GPT Image 1
          - openai/gpt-5-image                      # GPT-5 Image
          - openai/gpt-5.4-image-2                  # GPT-5.4 Image 2
          - openai/dall-e-3
          # --- Stable Diffusion ---
          - stabilityai/stable-diffusion-3-5-large
          - stabilityai/stable-diffusion-3-medium
          # --- Recraft ---
          - recraft-ai/recraft-v3
          # --- Ideogram ---
          - ideogram-ai/ideogram-v3
          - ideogram-ai/ideogram-v2
          # --- ByteDance Seedream ---
          - bytedance/seedream-4-5
          # --- Google (требует GEMINI_API_KEY) ---
          - google/imagen-4
          - google/gemini-2.5-flash-image
          - google/gemini-3.1-flash-image-preview   # Nano Banana 2

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate via OpenRouter
        if: ${{ !startsWith(inputs.model, 'google/') }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          sed -i "s|const MODEL = '.*'|const MODEL = '${{ inputs.model }}'|" scripts/generate-og-backgrounds-openrouter.mjs
          node scripts/generate-og-backgrounds-openrouter.mjs

      - name: Generate via Gemini Imagen 4
        if: ${{ inputs.model == 'google/imagen-4' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: imagen-4.0-generate-001
        run: node scripts/generate-og-backgrounds-gemini.mjs

      - name: Generate via Gemini Flash Image
        if: ${{ inputs.model == 'google/gemini-2.5-flash-image' || inputs.model == 'google/gemini-3.1-flash-image-preview' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ inputs.model == 'google/gemini-3.1-flash-image-preview' && 'gemini-3.1-flash-image-preview' || 'gemini-2.5-flash-image' }}
        run: node scripts/generate-og-backgrounds-gemini.mjs

      - name: Commit generated backgrounds
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/og-backgrounds/
          git diff --staged --quiet || git commit -m "chore(og): AI-фоны через ${{ inputs.model }}"
          git push
