name: Generate OG Backgrounds

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Модель генерации'
        required: false
        default: 'black-forest-labs/flux-1-schnell'
        type: choice
        options:
          # OpenRouter — FLUX (бесплатно / платно)
          - black-forest-labs/flux-1-schnell
          - black-forest-labs/flux-1-1-pro
          - black-forest-labs/flux-pro
          - black-forest-labs/flux-1-dev
          # OpenRouter — Stable Diffusion
          - stabilityai/stable-diffusion-3-5-large
          - stabilityai/stable-diffusion-3-medium
          # OpenRouter — DALL-E
          - openai/dall-e-3
          # Gemini (требует GEMINI_API_KEY + платный тариф)
          - google/imagen-4
          - google/gemini-2.5-flash-image

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate via OpenRouter
        if: ${{ !startsWith(inputs.model, 'google/') }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          sed -i "s|const MODEL = '.*'|const MODEL = '${{ inputs.model }}'|" scripts/generate-og-backgrounds-openrouter.mjs
          node scripts/generate-og-backgrounds-openrouter.mjs

      - name: Generate via Gemini Imagen 4
        if: ${{ inputs.model == 'google/imagen-4' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: imagen-4.0-generate-001
        run: node scripts/generate-og-backgrounds-gemini.mjs

      - name: Generate via Gemini 2.5 Flash Image
        if: ${{ inputs.model == 'google/gemini-2.5-flash-image' }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash-image
        run: node scripts/generate-og-backgrounds-gemini.mjs

      - name: Commit generated backgrounds
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/og-backgrounds/
          git diff --staged --quiet || git commit -m "chore(og): AI-фоны через ${{ inputs.model }}"
          git push
