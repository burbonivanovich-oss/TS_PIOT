name: Generate OG Backgrounds

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Модель генерации (OpenRouter или Gemini)'
        required: false
        default: 'black-forest-labs/flux-1-schnell'
        type: choice
        options:
          # OpenRouter — FLUX (бесплатно / платно)
          - black-forest-labs/flux-1-schnell
          - black-forest-labs/flux-1-1-pro
          - black-forest-labs/flux-pro
          - black-forest-labs/flux-1-dev
          # OpenRouter — Stable Diffusion
          - stabilityai/stable-diffusion-3-5-large
          - stabilityai/stable-diffusion-3-medium
          # OpenRouter — DALL-E
          - openai/dall-e-3
          # Gemini Imagen (требует GEMINI_API_KEY + платный тариф)
          - google/imagen-4

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate via OpenRouter
        if: ${{ !startsWith(inputs.model, 'google/') }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          sed -i "s|const MODEL = '.*'|const MODEL = '${{ inputs.model }}'|" scripts/generate-og-backgrounds-openrouter.mjs
          node scripts/generate-og-backgrounds-openrouter.mjs

      - name: Generate via Gemini Imagen
        if: ${{ startsWith(inputs.model, 'google/') }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generate-og-backgrounds.mjs

      - name: Commit generated backgrounds
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/og-backgrounds/
          git diff --staged --quiet || git commit -m "chore(og): AI-фоны через ${{ inputs.model }}"
          git push
