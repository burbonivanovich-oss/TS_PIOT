name: Generate OG Backgrounds

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'Модель генерации'
        required: false
        default: 'black-forest-labs/flux-1-schnell'
        type: choice
        options:
          # --- FLUX (Black Forest Labs) ---
          - black-forest-labs/flux-1-schnell        # бесплатно
          - black-forest-labs/flux-2-klein          # FLUX.2 fast ~$0.04/img
          - black-forest-labs/flux-2-max            # FLUX.2 лучшее ~$0.07/img
          - black-forest-labs/flux-1-1-pro
          - black-forest-labs/flux-pro
          - black-forest-labs/flux-1-dev
          # --- OpenAI ---
          - openai/gpt-image-1
          - openai/gpt-5-image
          - openai/gpt-5.4-image-2
          - openai/dall-e-3
          # --- Stable Diffusion ---
          - stabilityai/stable-diffusion-3-5-large
          - stabilityai/stable-diffusion-3-medium
          # --- Recraft ---
          - recraft-ai/recraft-v3                   # ~$0.04/img, лучший промпт-адеренс
          # --- Ideogram ---
          - ideogram-ai/ideogram-v3
          - ideogram-ai/ideogram-v2
          # --- ByteDance ---
          - bytedance/seedream-4-5                  # ~$0.02/img
          # --- Google Imagen 4 (GEMINI_API_KEY) ---
          - google/imagen-4-fast                    # ~$0.02/img
          - google/imagen-4                         # ~$0.04/img
          - google/imagen-4-ultra                   # ~$0.06/img
          # --- Google Gemini Image (Nano Banana) ---
          - google/gemini-2.5-flash-image           # Nano Banana ~$0.04/img
          - google/gemini-3.1-flash-image-preview   # Nano Banana 2 ~$0.045/img
          - google/gemini-3-pro-image-preview       # Nano Banana Pro ~$0.13/img

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate via OpenRouter
        if: ${{ !startsWith(inputs.model, 'google/') }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          sed -i "s|const MODEL = '.*'|const MODEL = '${{ inputs.model }}'|" scripts/generate-og-backgrounds-openrouter.mjs
          node scripts/generate-og-backgrounds-openrouter.mjs

      - name: Generate via Gemini
        if: ${{ startsWith(inputs.model, 'google/') }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ inputs.model == 'google/imagen-4-fast' && 'imagen-4.0-fast-generate-001' || inputs.model == 'google/imagen-4' && 'imagen-4.0-generate-001' || inputs.model == 'google/imagen-4-ultra' && 'imagen-4.0-ultra-generate-001' || inputs.model == 'google/gemini-2.5-flash-image' && 'gemini-2.5-flash-image' || inputs.model == 'google/gemini-3.1-flash-image-preview' && 'gemini-3.1-flash-image-preview' || 'gemini-3-pro-image-preview' }}
        run: node scripts/generate-og-backgrounds-gemini.mjs

      - name: Commit generated backgrounds
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/og-backgrounds/
          git diff --staged --quiet || git commit -m "chore(og): AI-фоны через ${{ inputs.model }}"
          git push
