name: Generate Flagship Illustrations

# Генерация иллюстраций к шагам флагмана-симулятора ТС ПИоТ.
# Скрипт: scripts/generate-flagship-illustrations.mjs
# Промты/стиль: src/content/wiki/flagship-ts-piot-moodboard.md
# Тестовый прогон: STEPS=1,7 — проверить, держит ли модель единый стиль.
# Боевой прогон: STEPS пусто → все 8 шагов.

on:
  workflow_dispatch:
    inputs:
      steps:
        description: 'Список шагов через запятую (например "1,7"). Пусто = все 8 шагов'
        required: false
        default: '1,7'
      force:
        description: 'Перезаписать существующие иллюстрации (1 = да)'
        required: false
        default: '0'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      STEPS: ${{ inputs.steps }}
      FORCE: ${{ inputs.force }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Generate flagship illustrations
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node scripts/generate-flagship-illustrations.mjs

      - name: Commit illustrations
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/flagship/
          git diff --staged --quiet || git commit -m "feat(flagship): иллюстрации шагов симулятора ТС ПИоТ"
          git push origin HEAD
