name: ORD Status — диагностика

on:
  workflow_dispatch:
    inputs:
      creatives:
        description: 'CREATIVES=1 — печатать статус каждого креатива'
        required: false
        default: 'false'

jobs:
  status:
    name: Статус-чек ОРД/ЕРИР
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Запрос статуса
        env:
          ORD_API_KEY: ${{ secrets.ORD_API_KEY }}
          CREATIVES:   ${{ github.event.inputs.creatives == 'true' && '1' || '' }}
        run: node scripts/ord-status.mjs
