name: IndexNow — отправка URL в Яндекс

# Уведомляет Яндекс (и Bing) о новых/обновлённых страницах через
# IndexNow API. Запускается после успешного деплоя — к моменту
# выполнения сайт уже актуален и Яндекс сможет переиндексировать.
#
# Скрипт: scripts/indexnow.mjs
# Ключ верификации: public/1d6d18d60df70390942afa4027dca91f.txt

on:
  # Автоматически после успешного деплоя:
  workflow_run:
    workflows: ['Deploy to GitHub Pages']
    types: [completed]

  # Ручной запуск с параметрами:
  workflow_dispatch:
    inputs:
      days:
        description: 'За сколько последних дней отправлять (по pubDate/updatedDate)'
        required: false
        default: '2'
      all:
        description: 'ALL=1 — отправить ВСЕ опубликованные URL (массовый бутстрап)'
        required: false
        default: '0'
      urls:
        description: 'Список URL через запятую (переопределяет режим по датам)'
        required: false
        default: ''
      dry_run:
        description: 'DRY_RUN=1 — план без отправки'
        required: false
        default: '0'

jobs:
  notify:
    # Если запущен из workflow_run — выполняем только при успешном деплое.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '22' }

      - name: Send to IndexNow
        env:
          DAYS:    ${{ inputs.days || '2' }}
          ALL:     ${{ inputs.all || '0' }}
          URLS:    ${{ inputs.urls || '' }}
          DRY_RUN: ${{ inputs.dry_run || '0' }}
        run: node scripts/indexnow.mjs
