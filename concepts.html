<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Этикетка — 7 концепций</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff}
a{text-decoration:none;color:inherit}
button{font:inherit;border:0;background:transparent;cursor:pointer;color:inherit}

.sw{position:fixed;top:0;left:0;right:0;z-index:9999;background:#0a0a0a;border-bottom:1px solid #222;display:flex;align-items:center;padding:0 16px;height:40px;overflow-x:auto}
.sw-l{color:#444;font-size:10px;letter-spacing:.16em;text-transform:uppercase;margin-right:14px;white-space:nowrap;flex-shrink:0}
.sw a{height:40px;padding:0 14px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#444;display:inline-flex;align-items:center;transition:color .12s,background .12s;white-space:nowrap}
.sw a:hover{color:#fff}
.sw a.on{color:#fff;background:#1c1c1c}
.sw .dot{width:7px;height:7px;border-radius:50%;margin-right:7px;display:inline-block}
.dotA{background:#E8175D}.dotB{background:#00D4FF}.dotC{background:#C41E3A}.dotD{background:#FFE600}.dotE{background:#1F4434}.dotF{background:#E5001A}.dotG{background:#C2F542}

.variant{min-height:100vh;scroll-margin-top:40px;background:var(--bg);color:var(--fg)}

.variant header.sh{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:56px;border-bottom:1px solid var(--line);position:sticky;top:40px;z-index:50;background:var(--bg)}
.variant .logo{font-weight:800;letter-spacing:-.02em;font-size:1.05rem;color:var(--fg)}
.variant .logo em{color:var(--accent);font-style:normal}
.variant nav{display:flex}
.variant nav a{font-size:.66rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:0 12px;transition:color .12s}
.variant nav a:hover{color:var(--fg)}
.variant .cta{font-size:.62rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;background:var(--accent);color:var(--accent-fg);padding:9px 18px}

/* === Split hero === */
.variant .hero{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--line)}
.variant .hp{background:var(--accent);color:var(--accent-fg);padding:28px 32px 24px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;min-height:480px}
.variant .hp-eb{font-size:.6rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.variant .hp-eb::before{content:'';width:24px;height:2px;background:var(--accent-fg);display:inline-block}
.variant .hp-mega{font-family:'Bebas Neue',sans-serif;line-height:.86;letter-spacing:.005em;text-transform:uppercase;font-size:clamp(3rem,7.2vw,6.4rem);font-weight:400}
.variant .hp-mega em{font-style:normal;background:var(--accent2);color:var(--fg);padding:0 .12em;display:inline-block}
.variant .hp-meta{font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;opacity:.78;display:flex;justify-content:space-between}

.variant .ht{padding:36px 36px 28px;display:flex;flex-direction:column;background:var(--card)}
.variant .ht-eb{font-size:.62rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
.variant .ht-h{font-size:clamp(1.4rem,2vw,1.85rem);font-weight:800;line-height:1.18;letter-spacing:-.02em;color:var(--fg);margin-bottom:14px}
.variant .ht-deck{font-size:.92rem;line-height:1.65;color:var(--muted);margin-bottom:18px}
.variant .ht-list{margin-top:auto;border-top:1px solid var(--line);padding-top:18px;display:grid;gap:12px}
.variant .ht-it{display:grid;grid-template-columns:1fr auto;align-items:baseline;gap:14px;padding-bottom:12px;border-bottom:1px dashed var(--line)}
.variant .ht-it:last-child{border-bottom:none;padding-bottom:0}
.variant .ht-it h4{font-size:.95rem;font-weight:700;line-height:1.3;letter-spacing:-.01em;color:var(--fg)}
.variant .ht-it span{font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);white-space:nowrap}

/* === Линия → Название === */
.variant .sec{display:flex;align-items:center;gap:16px;padding:38px 28px 14px}
.variant .sec::before{content:'';flex:0 0 56px;height:1px;background:var(--fg)}
.variant .sec-t{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.04em;text-transform:uppercase;color:var(--fg);line-height:1}
.variant .sec-n{margin-left:auto;font-size:.6rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}

/* === Постер-сетка — текст 80% === */
.variant .pg{display:grid;gap:2px;background:var(--line);padding:0 28px;grid-template-columns:repeat(6,1fr)}
.variant .ps{background:var(--card);padding:12px 14px 14px;display:flex;flex-direction:column;cursor:pointer;transition:background .12s;position:relative;overflow:hidden;min-height:240px}
.variant .ps:hover{background:var(--card-h)}
.variant .ps .pt{font-size:.55rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:auto;padding-bottom:8px}
.variant .ps .ph{font-family:'Bebas Neue',sans-serif;font-weight:400;line-height:.92;letter-spacing:.01em;text-transform:uppercase;color:var(--fg);margin-top:auto}
.variant .ps .pm{font-size:.56rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:10px}

.variant .sz-xl{grid-column:span 4;min-height:420px}
.variant .sz-xl .ph{font-size:clamp(2.4rem,4.4vw,3.4rem)}
.variant .sz-lg{grid-column:span 3;min-height:340px}
.variant .sz-lg .ph{font-size:clamp(1.9rem,3.4vw,2.6rem)}
.variant .sz-md{grid-column:span 2;min-height:260px}
.variant .sz-md .ph{font-size:clamp(1.4rem,2.4vw,2rem)}
.variant .sz-sm{grid-column:span 2;min-height:200px}
.variant .sz-sm .ph{font-size:clamp(1.2rem,2vw,1.7rem)}
.variant .sz-x2{grid-column:span 2;min-height:240px}
.variant .sz-x2 .ph{font-size:clamp(1.3rem,2.2vw,1.85rem)}
.variant .sz-3{grid-column:span 3;min-height:240px}
.variant .sz-3 .ph{font-size:clamp(1.6rem,2.8vw,2.2rem)}

.variant .ps.acc{background:var(--accent);color:var(--accent-fg)}
.variant .ps.acc .pt{color:var(--accent-fg);opacity:.7}
.variant .ps.acc .ph{color:var(--accent-fg)}
.variant .ps.acc .pm{color:var(--accent-fg);opacity:.5}
.variant .ps.dark{background:var(--fg);color:var(--bg)}
.variant .ps.dark .pt{color:var(--accent2);opacity:1}
.variant .ps.dark .ph{color:var(--bg)}
.variant .ps.dark .pm{color:var(--bg);opacity:.4}
.variant .ps.acc2{background:var(--accent2);color:var(--fg)}
.variant .ps.acc2 .pt{color:var(--fg);opacity:.6}
.variant .ps.acc2 .ph{color:var(--fg)}
.variant .ps.acc2 .pm{color:var(--fg);opacity:.45}

.variant .cats{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--line);padding:0 28px}
.variant .cb{background:var(--card);padding:24px 22px;display:flex;align-items:flex-end;justify-content:space-between;cursor:pointer;transition:background .12s;min-height:140px}
.variant .cb:hover{background:var(--card-h)}
.variant .cb-n{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:.04em;text-transform:uppercase;color:var(--fg);line-height:.9}
.variant .cb-c{font-family:'Bebas Neue',sans-serif;font-size:3.6rem;color:var(--accent);line-height:.85}

.variant .news{margin:38px 28px 0;padding:28px 32px;background:var(--card-h);display:grid;grid-template-columns:1fr auto;align-items:center;gap:24px;border:1px solid var(--line)}
.variant .news h3{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.04em;text-transform:uppercase;color:var(--fg);line-height:.95;margin-bottom:6px}
.variant .news p{font-size:.85rem;color:var(--muted);line-height:1.55;max-width:480px}
.variant .news form{display:flex;border:1px solid var(--fg)}
.variant .news input{padding:13px 16px;background:transparent;border:0;font:inherit;font-size:.82rem;color:var(--fg);outline:none;min-width:240px}
.variant .news input::placeholder{color:var(--muted)}
.variant .news button{padding:13px 22px;background:var(--fg);color:var(--bg);font-size:.62rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase}

.variant footer.ft{margin-top:38px;padding:32px 28px 24px;border-top:1px solid var(--line);background:var(--card)}
.variant .ft-in{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:36px}
.variant .ft-logo{display:block;font-weight:800;letter-spacing:-.02em;font-size:1.05rem;color:var(--fg);margin-bottom:8px}
.variant .ft-logo em{color:var(--accent);font-style:normal}
.variant .ft-about{font-size:.78rem;line-height:1.6;color:var(--muted)}
.variant .ft-h{font-size:.55rem;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
.variant .ft ul{list-style:none}
.variant .ft li{margin-bottom:5px}
.variant .ft a{font-size:.8rem;color:var(--muted)}
.variant .ft a:hover{color:var(--fg)}
.variant .ft-copy{margin-top:24px;padding-top:18px;border-top:1px solid var(--line);font-size:.65rem;color:var(--muted)}

/* ============ A — Песок (DELO) ============ */
#vA{--bg:#F4EDE0;--fg:#1A1408;--card:#F4EDE0;--card-h:#EDE3D0;--accent:#E8175D;--accent-fg:#FFFFFF;--accent2:#C8F500;--muted:rgba(26,20,8,.5);--line:rgba(26,20,8,.16)}

/* ============ B — Уголь ============ */
#vB{--bg:#141414;--fg:#F0EDE5;--card:#1A1A1A;--card-h:#212121;--accent:#00D4FF;--accent-fg:#000000;--accent2:#F0EDE5;--muted:rgba(240,237,229,.4);--line:rgba(240,237,229,.08)}
#vB .ps.dark{background:#0A0A0A}

/* ============ C — Кирпич ============ */
#vC{--bg:#F1E9D9;--fg:#1A1108;--card:#F1E9D9;--card-h:#E8DEC9;--accent:#C41E3A;--accent-fg:#F1E9D9;--accent2:#D4A14A;--muted:rgba(26,17,8,.52);--line:rgba(26,17,8,.18)}

/* ============ D — Bauhaus ============ */
#vD{--bg:#FFFFFF;--fg:#000000;--card:#FFFFFF;--card-h:#F4F4F4;--accent:#FFE600;--accent-fg:#000000;--accent2:#E5001A;--muted:rgba(0,0,0,.5);--line:rgba(0,0,0,.18)}
#vD header.sh{border-bottom:3px solid #000}
#vD .hero{border-bottom:3px solid #000}
#vD .pg{background:#000;gap:3px}
#vD .cats{background:#000;gap:3px;border-top:3px solid #000;border-bottom:3px solid #000}
#vD .ps.acc .pt,#vD .ps.acc .ph,#vD .ps.acc .pm{color:#000}
#vD .ps.dark{background:#E5001A;color:#fff}
#vD .ps.dark .pt{color:#FFE600}
#vD .ps.dark .ph{color:#fff}
#vD .news{border:3px solid #000;background:#FFE600}
#vD .news form{border:3px solid #000}
#vD footer.ft{border-top:3px solid #000}

/* ============ E — FT premium ============ */
#vE{--bg:#F6EFE2;--fg:#0F2418;--card:#F6EFE2;--card-h:#EEE5D0;--accent:#1F4434;--accent-fg:#F6EFE2;--accent2:#C9973C;--muted:rgba(15,36,24,.55);--line:rgba(15,36,24,.18)}
#vE .ht-h{font-style:italic;font-weight:700}

/* ============ F — Конструктивизм ============ */
#vF{--bg:#FFFFFF;--fg:#0A0A0A;--card:#FFFFFF;--card-h:#F2F2F2;--accent:#E5001A;--accent-fg:#FFFFFF;--accent2:#0A0A0A;--muted:rgba(10,10,10,.55);--line:rgba(10,10,10,.2)}
#vF header.sh{border-bottom:2px solid #0A0A0A}
#vF .pg{background:#0A0A0A;gap:2px}
#vF .ps.dark{background:#0A0A0A;color:#fff}
#vF .ps.dark .pt{color:#E5001A;opacity:1}
#vF .hp-mega em{background:#0A0A0A;color:#fff}
#vF .news{border:2px solid #0A0A0A;background:#FFE600}
#vF .news h3{color:#0A0A0A}

/* ============ G — Сланец + лайм ============ */
#vG{--bg:#1B1F24;--fg:#E6E9EE;--card:#22272E;--card-h:#2A3038;--accent:#C2F542;--accent-fg:#0A0F14;--accent2:#E6E9EE;--muted:rgba(230,233,238,.4);--line:rgba(230,233,238,.08)}
#vG .ps.dark{background:#0F1318}
#vG .news{background:#0F1318}
#vG .news button{background:#C2F542;color:#0A0F14}
</style>
</head>
<body>

<div class="sw">
  <span class="sw-l">7 концепций:</span>
  <a href="#vA" class="on" onclick="sa(this)"><i class="dot dotA"></i>A — Песок</a>
  <a href="#vB" onclick="sa(this)"><i class="dot dotB"></i>B — Уголь</a>
  <a href="#vC" onclick="sa(this)"><i class="dot dotC"></i>C — Кирпич</a>
  <a href="#vD" onclick="sa(this)"><i class="dot dotD"></i>D — Bauhaus</a>
  <a href="#vE" onclick="sa(this)"><i class="dot dotE"></i>E — Premium</a>
  <a href="#vF" onclick="sa(this)"><i class="dot dotF"></i>F — Конструктивизм</a>
  <a href="#vG" onclick="sa(this)"><i class="dot dotG"></i>G — Лайм</a>
</div>
<div style="height:40px"></div>

  </section>
  <div class="sec"><span class="sec-t">На этой неделе</span><span class="sec-n">14 материалов</span></div>

    <a class="ps sz-xl acc"><span class="pt">Маркировка · Лонгрид</span><h3 class="ph">Разрешительный режим: что изменилось в апреле 2026</h3><span class="pm">27 апр · 9 мин · Е. Соколова</span></a>

  <div class="cats">

    <div class="cb"><div class="cb-n">Маркировка</div><div class="cb-c">147</div></div>

  <footer class="ft">
    <div class="ft-in">
      <div><a class="ft-logo" href="#">эти<em>кет</em>ка.</a><p class="ft-about">Информационный портал для малого и среднего бизнеса.</p></div>
      <div><div class="ft-h">Разделы</div><ul><li><a>ТС ПИоТ</a></li><li><a>Маркировка</a></li><li><a>Законодательство</a></li></ul></div>
      <div><div class="ft-h">Инструменты</div><ul><li><a>Калькулятор</a></li><li><a>Словарь</a></li><li><a>RSS</a></li></ul></div>

</template>

<div id="vA" class="variant"></div>
<div id="vB" class="variant"></div>
<div id="vC" class="variant"></div>
<div id="vD" class="variant"></div>
<div id="vE" class="variant"></div>
<div id="vF" class="variant"></div>
<div id="vG" class="variant"></div>

<script>
const tpl=document.getElementById('tpl').innerHTML;
['vA','vB','vC','vD','vE','vF','vG'].forEach(id=>{document.getElementById(id).innerHTML=tpl});

function sa(el){document.querySelectorAll('.sw a').forEach(b=>b.classList.remove('on'));el.classList.add('on')}
const io=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting&&x.intersectionRatio>.25){const b=document.querySelector(`.sw a[href="#${x.target.id}"]`);if(b){document.querySelectorAll('.sw a').forEach(v=>v.classList.remove('on'));b.classList.add('on')}}})},{threshold:.25});
document.querySelectorAll('.variant').forEach(v=>io.observe(v));
</script>
</body>
