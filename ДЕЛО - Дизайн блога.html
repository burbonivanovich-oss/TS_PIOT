<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>ДЕЛО — независимое медиа для малого бизнеса</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter+Tight:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; background: #d8d5cd; font-family: 'Inter Tight', system-ui, sans-serif; }
    * { box-sizing: border-box; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="design-system.jsx"></script>

  <!-- v1 — original direction (журнальный, тёмная и т.д.) -->
  <script type="text/babel" src="home-a.jsx"></script>
  <script type="text/babel" src="home-b.jsx"></script>
  <script type="text/babel" src="home-c.jsx"></script>
  <script type="text/babel" src="articles.jsx"></script>
  <script type="text/babel" src="article.jsx"></script>

  <!-- v2 — спокойнее, без мужских стереотипов (тёплая бумага, графит, акцент) -->
  <script type="text/babel" src="v2-home-a.jsx"></script>
  <script type="text/babel" src="v2-home-b.jsx"></script>
  <script type="text/babel" src="v2-home-c.jsx"></script>
  <script type="text/babel" src="v2-articles.jsx"></script>

  <!-- m3 — компромисс между v1 и v2 по референсу -->
  <script type="text/babel" src="article-v15.jsx"></script>

  <!-- Извлечённые фреймы по комментариям Карен -->
  <script type="text/babel" src="extracted-frames.jsx"></script>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard } = window;

    function App() {
      return (
        <DesignCanvas
          title="ДЕЛО — независимое медиа"
          subtitle="Дизайн-система и ключевые страницы блога для малого бизнеса"
        >
          <DCSection id="ds" title="01 — Дизайн-система" subtitle="Айдентика, палитра, типографика, компоненты">
            <DCArtboard id="ds-cover" label="Обложка" width={1280} height={720}>
              <window.DSCover />
            </DCArtboard>
            <DCArtboard id="ds-colors" label="Палитра" width={1280} height={880}>
              <window.DSColors />
            </DCArtboard>
            <DCArtboard id="ds-type" label="Типографика" width={1280} height={1040}>
              <window.DSType />
            </DCArtboard>
            <DCArtboard id="ds-comp" label="Компоненты" width={1280} height={980}>
              <window.DSComponents />
            </DCArtboard>
          </DCSection>

          <DCSection id="home" title="02 — Главная (v1)" subtitle="Первая итерация — журнальная, типографическая, тёмная">
            <DCArtboard id="home-a" label="A · Журнальная обложка" width={1440} height={2160}>
              <window.HomeA />
            </DCArtboard>
            <DCArtboard id="home-b" label="B · Типографическая лента" width={1440} height={2640}>
              <window.HomeB />
            </DCArtboard>
            <DCArtboard id="home-c" label="C · Тёмная современная" width={1440} height={1900}>
              <window.HomeC />
            </DCArtboard>
          </DCSection>

          <DCSection id="home-v2" title="02b — Главная (v2)" subtitle="Спокойнее, без брутализма — для женской ЦА и спокойного бизнес-чтения">
            <DCArtboard id="home-v2a" label="A · Тёплая газета" width={1440} height={2200}>
              <window.HomeV2A />
            </DCArtboard>
            <DCArtboard id="home-v2b" label="B · Карточки и сетка" width={1440} height={2200}>
              <window.HomeV2B />
            </DCArtboard>
            <DCArtboard id="home-v2c" label="C · Кураторская подборка" width={1440} height={2200}>
              <window.HomeV2C />
            </DCArtboard>
          </DCSection>

          <DCSection id="list" title="03 — Раздел со всеми статьями" subtitle="Каталог с фильтрами, главными материалами и архивом">
            <DCArtboard id="articles" label="v1 · Все статьи" width={1440} height={2200}>
              <window.Articles />
            </DCArtboard>
            <DCArtboard id="articles-v2" label="v2 · Все статьи (спокойнее)" width={1440} height={2400}>
              <window.ArticlesV2 />
            </DCArtboard>
          </DCSection>

          <DCSection id="frames" title="04a — Извлечённые фреймы" subtitle="По комментариям Карен — отдельные фреймы для шапки, TL;DR и футера статьи">
            <DCArtboard id="frame-hero" label="Фрейм 01 · Шапка статьи" width={1440} height={720}>
              <window.FrameHero />
            </DCArtboard>
            <DCArtboard id="frame-tldr" label="Фрейм 02 · Блок TL;DR" width={1440} height={620}>
              <window.FrameTLDR />
            </DCArtboard>
            <DCArtboard id="frame-footer" label="Фрейм 03 · Футер статьи" width={1440} height={1880}>
              <window.FrameArticleFooter />
            </DCArtboard>
          </DCSection>

          <DCSection id="art" title="04 — Страница статьи" subtitle="v1 — по референсу; m3 — компромисс v1×v2; v2 — спокойнее; v2-alt — без референса">
            <DCArtboard id="article-v15" label="v1.5 · Компромисс v1 × v2 (рекомендую)" width={1440} height={6800}>
              <window.ArticleV15 />
            </DCArtboard>
            <DCArtboard id="article" label="v1 · По референсу (контрастный)" width={1440} height={3400}>
              <window.Article />
            </DCArtboard>
            <DCArtboard id="article-v2" label="v2 · По референсу (спокойнее)" width={1440} height={3500}>
              <window.ArticleV2 />
            </DCArtboard>
            <DCArtboard id="article-v2alt" label="v2 · Без референса (одна колонка)" width={1440} height={3200}>
              <window.ArticleV2Alt />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
